<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; frame-src 'self' about: email-reader:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unsync Mail</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="top-drag-bar" class="app-top-bar app-header top-bar">
      <div class="mac-traffic-lights-spacer"></div>

      <div class="brand-title">Unsync Mail</div>

      <select id="account-selector" class="account-selector" aria-label="Email account">
        <option value="">All Accounts</option>
      </select>

      <div class="header-actions">
        <button id="btn-notifications" title="Notifications" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
        </button>
        <button id="sidebar-gear" title="Settings" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
        <button id="btn-help" title="Help" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M9.09 9a3 3 0 1 1 5.82 1c-.44.75-1.13 1.12-1.76 1.57-.62.44-1.15.96-1.15 1.93"></path>
            <path d="M12 17h.01"></path>
          </svg>
        </button>
        <button id="btn-profile" class="profile-button" title="Profile" type="button" aria-label="Profile">U</button>
      </div>

      <div class="win-controls-overlay-spacer"></div>
    </div>

    <div class="fourth-panel-toolbar">
      <div class="toolbar-actions">
        <button id="compose-button" class="compose-button" type="button">
          <span aria-hidden="true">+</span>
          <span>Compose</span>
        </button>
        <button id="refresh-button" class="refresh-button" type="button">
          <span aria-hidden="true">↻</span>
          <span>Refresh</span>
        </button>
      </div>

      <div id="search-container" class="header-search-container">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input
          type="text"
          id="global-search"
          placeholder="Search..."
          autocomplete="off"
        />
      </div>
    </div>

    <main class="app-shell">
      <aside class="sidebar" aria-label="Folders">
        <nav class="sidebar-folders" aria-label="Mail folders">
          <button class="sidebar-folder is-active" type="button" data-folder="Inbox">Inbox</button>
          <button class="sidebar-folder" type="button" data-folder="Sent Items">Sent</button>
          <button class="sidebar-folder" type="button" data-folder="Outbox">Outbox</button>
          <button class="sidebar-folder" type="button" data-folder="Drafts">Drafts</button>
          <button class="sidebar-folder" type="button" data-folder="Archive">Archive</button>
          <button class="sidebar-folder" type="button" data-folder="Junk Email">Spam/Junk</button>
          <button class="sidebar-folder" type="button" data-folder="Deleted Items">Trash</button>
        </nav>

        <div class="sidebar-calendar-widget">
          <div class="calendar-header">
            <span id="calendar-month-year"></span>
          </div>
          <div class="calendar-weekdays">
            <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
          </div>
          <div id="calendar-days-grid" class="calendar-days"></div>
        </div>

        <div class="sidebar-todo-widget">
          <h3>My Day</h3>
          <div class="todo-input-row">
            <input type="text" id="todo-new-item" placeholder="Add a task..." />
            <button id="todo-add-btn" type="button">+</button>
          </div>
          <ul id="todo-list-items"></ul>
        </div>

        <button id="add-account-button" class="add-account-button" type="button">
          <span aria-hidden="true">+</span>
          <span>Add Account</span>
        </button>

        <div class="sidebar-status">
          <span class="status-dot"></span>
          <span id="status-text">Local cache ready.</span>
        </div>
      </aside>

      <section class="feed-pane" aria-label="Messages">
        <header class="feed-header">
          <h1>Inbox</h1>
        </header>

        <div id="message-list" class="message-list"></div>
        <div id="empty-state" class="empty-state" hidden>No cached messages.</div>
      </section>

      <section id="reader-pane" class="reader-pane" aria-label="Reading view">
        <header class="reader-header">
          <div class="reader-title-block">
            <h2 id="reader-subject">Select a message</h2>
          </div>
          <div id="shield-badge" class="shield-badge" hidden>
            <span class="shield-badge__icon"></span>
            <span>Shield</span>
          </div>
        </header>
        <div class="reader-top-bar">
          <div class="reader-toggle-container">
            <label class="theme-switch-label">
              <input type="checkbox" id="iframe-theme-toggle" />
              <span class="switch-text">Dark View</span>
            </label>
          </div>

          <div class="reader-date-actions-row">
            <div class="reader-actions-group">
              <button id="btn-reply" type="button">Reply</button>
              <button id="btn-reply-all" type="button">Reply All</button>
              <button id="btn-forward" type="button">Forward</button>
              <button id="btn-delete" type="button">Delete</button>
              <button id="btn-spam" type="button">Report Spam</button>
              <button id="btn-more-menu" class="more-menu-trigger" type="button">•••</button>
            </div>
          </div>
        </div>
        <div class="reader-metadata-ribbon">
          <div class="aligned-meta-block">
            <div class="meta-line"><span class="meta-key">From</span><span class="meta-colon">:</span><span id="meta-exact-from" class="meta-val">...</span></div>
            <div class="meta-line"><span class="meta-key">To</span><span class="meta-colon">:</span><span id="meta-exact-to" class="meta-val">...</span></div>
            <div class="meta-line"><span class="meta-key">Date</span><span class="meta-colon">:</span><span id="meta-exact-date" class="meta-val">...</span></div>
          </div>
        </div>
        <iframe
          id="reader-iframe"
          class="reader-iframe"
          sandbox="allow-popups"
          partition="persist:email-reader"
          referrerpolicy="no-referrer"
          title="Email body"
        ></iframe>
      </section>
    </main>

    <dialog id="passphrase-dialog" class="passphrase-dialog">
      <form id="passphrase-form" method="dialog" class="passphrase-card">
        <h2>Unlock Unsync Shield</h2>
        <label for="passphrase-input">Private key passphrase</label>
        <input id="passphrase-input" type="password" autocomplete="current-password" />
        <p id="passphrase-error" class="passphrase-error"></p>
        <div class="dialog-actions">
          <button id="cancel-decrypt" type="button" class="button-secondary">Cancel</button>
          <button type="submit" class="button-primary">Decrypt</button>
        </div>
      </form>
    </dialog>

    <dialog id="settings-modal" class="settings-modal">
      <form id="settings-form" method="dialog" class="settings-panel">
        <header class="settings-header">
          <div>
            <p class="settings-kicker">Account</p>
            <h2>Mail Server Settings</h2>
          </div>
          <button id="close-settings" class="icon-button" type="button" aria-label="Close settings">×</button>
        </header>

        <div class="settings-grid">
          <label class="full-width">
            <span>Email Address</span>
            <input id="account-email" type="email" autocomplete="email" required placeholder="user@example.com" />
          </label>
          <label class="full-width">
            <span>App Password</span>
            <input id="account-password" type="password" autocomplete="current-password" required placeholder="••••••••••••••••" />
          </label>
          <label>
            <span>IMAP Host</span>
            <input id="imap-host" type="text" autocomplete="off" required placeholder="imap.example.com" />
          </label>
          <label>
            <span>IMAP Port</span>
            <input id="imap-port" type="number" min="1" max="65535" inputmode="numeric" required value="993" />
          </label>
          <label>
            <span>SMTP Host</span>
            <input id="smtp-host" type="text" autocomplete="off" required placeholder="smtp.example.com" />
          </label>
          <label>
            <span>SMTP Port</span>
            <input id="smtp-port" type="number" min="1" max="65535" inputmode="numeric" required value="465" />
          </label>
        </div>

        <p id="settings-error" class="settings-error"></p>

        <footer class="settings-actions">
          <button id="delete-account-button" class="button-danger" type="button" hidden>Remove Account</button>
          <button id="gmail-defaults" class="button-secondary" type="button">Gmail Defaults</button>
          <button class="button-primary" type="submit">Save Account</button>
        </footer>
      </form>
    </dialog>

    <dialog id="compose-modal" class="compose-modal">
      <form id="compose-form" method="dialog" class="compose-panel">
        <header class="compose-header">
          <div>
            <p class="compose-kicker">New Message</p>
            <h2>Compose Email</h2>
          </div>
          <button id="close-compose" class="icon-button" type="button" aria-label="Close compose">x</button>
        </header>

        <div class="compose-grid">
          <label>
            <span>To</span>
            <input id="compose-to" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>CC</span>
            <input id="compose-cc" type="text" autocomplete="off" />
          </label>
          <label>
            <span>BCC</span>
            <input id="compose-bcc" type="text" autocomplete="off" />
          </label>
          <label>
            <span>Subject</span>
            <input id="compose-subject" type="text" autocomplete="off" required />
          </label>
          <label class="compose-body-field">
            <span>Body</span>
            <textarea id="compose-body" required></textarea>
          </label>
        </div>

        <label class="shield-toggle">
          <input id="compose-shield" type="checkbox" />
          <span>Use Unsync Shield</span>
        </label>

        <section class="attachment-section" aria-label="Attachments">
          <button id="attach-file-button" class="button-secondary attach-file-button" type="button">
            Attach File
          </button>
          <ul id="attachment-list" class="attachment-list"></ul>
        </section>

        <p id="compose-error" class="compose-error"></p>

        <footer class="compose-actions">
          <button id="cancel-compose" class="button-secondary" type="button">Cancel</button>
          <button id="send-compose" class="button-primary" type="submit">Send</button>
        </footer>
      </form>
    </dialog>

    <div id="toast" class="toast" hidden></div>

    <script src="../dist/renderer.js"></script>
  </body>
</html>
