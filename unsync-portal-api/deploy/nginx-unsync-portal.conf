# Example nginx site for Unsync Secure Portal.
# Install as /etc/nginx/sites-available/unsync-portal and symlink into sites-enabled.

limit_req_zone $binary_remote_addr zone=unsync_portal_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=unsync_portal_otp:10m rate=2r/m;
limit_req_zone $binary_remote_addr zone=unsync_portal_attachments:10m rate=30r/s;

upstream unsync_portal_api {
  server 127.0.0.1:8787;
  keepalive 16;
}

server {
  listen 80;
  listen [::]:80;
  server_name mail.unsync.uk api.mail.unsync.uk;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name mail.unsync.uk;

  ssl_certificate /etc/letsencrypt/live/mail.unsync.uk/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mail.unsync.uk/privkey.pem;

  client_max_body_size 2m;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Connection "";

  location = /health {
    limit_req zone=unsync_portal_api burst=20 nodelay;
    proxy_pass http://unsync_portal_api;
  }

  location /reader/ {
    add_header Cache-Control "no-store, max-age=0" always;
    limit_req zone=unsync_portal_api burst=20 nodelay;
    proxy_pass http://unsync_portal_api;
  }

  location /read/ {
    add_header Cache-Control "no-store, max-age=0" always;
    limit_req zone=unsync_portal_api burst=20 nodelay;
    proxy_pass http://unsync_portal_api;
  }

  location /portal/ {
    add_header Cache-Control "no-store, max-age=0" always;
    client_max_body_size 1m;
    limit_req zone=unsync_portal_api burst=20 nodelay;
    proxy_pass http://unsync_portal_api;
  }

  location /ops {
    add_header Cache-Control "no-store, max-age=0" always;
    limit_req zone=unsync_portal_api burst=5 nodelay;
    proxy_pass http://unsync_portal_api;
  }

  location / {
    return 404;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.mail.unsync.uk;

  ssl_certificate /etc/letsencrypt/live/api.mail.unsync.uk/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.mail.unsync.uk/privkey.pem;

  client_max_body_size 2m;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Connection "";

  location = /health {
    limit_req zone=unsync_portal_api burst=20 nodelay;
    proxy_pass http://unsync_portal_api;
  }

  location ~ ^/portal/[^/]+/(request-otp|verify-otp)$ {
    add_header Cache-Control "no-store, max-age=0" always;
    client_max_body_size 1m;
    limit_req zone=unsync_portal_otp burst=3 nodelay;
    proxy_pass http://unsync_portal_api;
  }

  location ~ ^/portal/[^/]+/attachment/[^/]+/chunk/[0-9]+$ {
    add_header Cache-Control "no-store, max-age=0" always;
    client_max_body_size 2m;
    limit_req zone=unsync_portal_attachments burst=60 nodelay;
    proxy_pass http://unsync_portal_api;
  }

  location /portal/ {
    add_header Cache-Control "no-store, max-age=0" always;
    client_max_body_size 1m;
    limit_req zone=unsync_portal_api burst=20 nodelay;
    proxy_pass http://unsync_portal_api;
  }

  location /ops {
    add_header Cache-Control "no-store, max-age=0" always;
    limit_req zone=unsync_portal_api burst=5 nodelay;
    proxy_pass http://unsync_portal_api;
  }

  location /reader/ {
    add_header Cache-Control "no-store, max-age=0" always;
    limit_req zone=unsync_portal_api burst=20 nodelay;
    proxy_pass http://unsync_portal_api;
  }

  location /read/ {
    add_header Cache-Control "no-store, max-age=0" always;
    limit_req zone=unsync_portal_api burst=20 nodelay;
    proxy_pass http://unsync_portal_api;
  }

  location / {
    return 404;
  }
}
